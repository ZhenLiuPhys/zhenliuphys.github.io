hero_lead: >
  I am an Associate Professor of Physics at the University of Minnesota specializing
  in theoretical high-energy particle physics. My research focuses on collider
  phenomenology at the LHC and future facilities including CEPC, FCC, and muon
  colliders, together with scattering amplitudes and dark-sector physics. My current
  research is actively exploring and integrating AI/ML to deepen our fundamental
  physics research, in particular with jets in colliders and scattering amplitudes.
  By bridging high energy theory with present and future experiments, including
  quantum-sensing platforms, my group aims to reveal new paradigms in particle
  physics across scales.
