research_intro: >
  My group connects quantum field theory to experiment—from LHC and future collider
  programs to small-scale sensing platforms. We aim for signatures experiments can
  target now: Higgs-sector precision, robust BSM handles at hadron and lepton
  machines, and dark-sector models with concrete experimental pipelines.
research_summary: >
  Active directions include muon-collider electroweak physics, dark-sector and
  quantum-sensing phenomenology, and amplitude-driven BSM studies at hadron and
  future colliders, with ongoing links to neutrino facilities and data-driven methods.
